<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Raaag">
<meta name="theme-color" content="#f2f2f7">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>Raaag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js" onerror="window.jsmediatags=null"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --bg:#f2f2f7;--card:#fff;--border:#e5e5ea;--border2:#d1d1d6;
  --accent:#ff6f00;--accent2:#ff9500;
  --t1:#000;--t2:#3c3c43;--t3:#8e8e93;--t4:#aeaeb2;--red:#ff3b30;
  --radius:14px;--radius-sm:10px;--radius-lg:20px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.05);
  --shadow-md:0 2px 8px rgba(0,0,0,.10),0 8px 24px rgba(0,0,0,.08);
}
html,body,#app{height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,-apple-system,sans-serif;overflow:hidden;overscroll-behavior:none}
#app{display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}
button{font-family:inherit;border:none;cursor:pointer;background:transparent;color:inherit}
button svg,button img{pointer-events:none}
input{font-family:inherit}
img{display:block}
::-webkit-scrollbar{display:none}
#screen{flex:1;display:flex;flex-direction:column;overflow:hidden;animation:fadeIn .22s ease}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:110px}
.center-fill{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;gap:20px}
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px 10px;padding-top:max(env(safe-area-inset-top),16px);
  background:rgba(242,242,247,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;
}
.header-brand{display:flex;align-items:center;gap:9px}
.header-icon{width:32px;height:32px;border-radius:8px;overflow:hidden;flex-shrink:0}
.header-icon img{width:100%;height:100%}
.app-title{font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--accent)}
.header-btns{display:flex;gap:4px}
.icon-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--accent);transition:background .15s;flex-shrink:0}
.icon-btn:active{background:rgba(0,0,0,.06)}
.search-wrap{padding:10px 16px 6px;background:var(--bg)}
.search-inner{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;gap:8px;box-shadow:var(--shadow)}
.search-inner input{flex:1;border:none;outline:none;font-size:15px;color:var(--t1);background:transparent}
.search-inner input::placeholder{color:var(--t3)}
.search-clear-btn{color:var(--t3);display:flex;padding:2px;cursor:pointer}
.hero{
  margin:12px 16px 4px;border-radius:20px;overflow:hidden;
  background:linear-gradient(135deg,#0d2237 0%,#1a3a55 50%,#0d2237 100%);
  padding:20px;position:relative;
}
.hero-mandala{position:absolute;right:-20px;top:-20px;width:160px;height:160px;opacity:.08}
.hero-inner{position:relative;z-index:1;display:flex;align-items:center;gap:14px}
.hero-icon-wrap{width:64px;height:64px;border-radius:16px;overflow:hidden;flex-shrink:0;box-shadow:0 6px 20px rgba(0,0,0,.35)}
.hero-icon-wrap img{width:100%;height:100%}
.hero-text{flex:1}
.hero-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.5px}
.hero-sub{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}
.hero-stats{display:flex;gap:8px;margin-top:12px}
.hero-chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:5px 12px;display:flex;align-items:center;gap:5px;cursor:pointer}
.hero-chip-num{font-size:14px;font-weight:700;color:#fff}
.hero-chip-label{font-size:11px;color:rgba(255,255,255,.7)}
.stats-row{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 4px}
.folder-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:6px 12px}
.folder-card{
  height:40px;display:flex;flex-direction:column;justify-content:center;
  background:var(--card);border-radius:8px;box-shadow:var(--shadow);
  padding:0 8px;cursor:pointer;transition:transform .12s,box-shadow .12s;overflow:hidden;
}
.folder-card:active{transform:scale(.95);box-shadow:none}
.folder-name{font-size:11px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folder-meta{font-size:9px;color:var(--t3);margin-top:2px}
.song-row{display:flex;align-items:center;gap:12px;padding:9px 16px;cursor:pointer;transition:background .1s}
.song-row:active{background:rgba(0,0,0,.04)}
.song-row.playing{background:rgba(255,111,0,.06)}
.song-art{width:50px;height:50px;border-radius:8px;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,#f0e6d4,#ffd8a8);position:relative}
.song-art img{width:100%;height:100%;object-fit:cover}
.song-art-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--accent)}
.song-info{flex:1;min-width:0}
.song-title{font-size:15px;font-weight:500;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.song-title.active{color:var(--accent)}
.song-sub{font-size:13px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.song-dur{font-size:12px;color:var(--t4);flex-shrink:0;font-variant-numeric:tabular-nums}
.eq-anim{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.7);border-radius:8px}
.eq-bars{display:flex;gap:2px;align-items:flex-end;height:18px}
.eq-bars span{display:block;width:3px;background:var(--accent);border-radius:2px;animation:eq .7s ease-in-out infinite}
.eq-bars span:nth-child(2){animation-delay:.15s}
.eq-bars span:nth-child(3){animation-delay:.30s}
.section-title{font-size:13px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;padding:16px 20px 6px}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border-radius:var(--radius);font-size:16px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(255,111,0,.3);transition:opacity .15s;border:none}
.btn-primary:active{opacity:.85}
.btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;background:var(--card);color:var(--accent);border:1.5px solid var(--border2);cursor:pointer;transition:background .15s}
.btn-pill{padding:7px 16px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-pill-off{background:var(--bg);color:var(--t3);border:1px solid var(--border2)}
.btn-pill-on{background:var(--accent);color:#fff}
.btn-danger{color:var(--red);font-size:13px;font-weight:500;cursor:pointer;padding:2px;background:none;border:none}
.progress-wrap{position:relative;padding:6px 0}
.progress-bg{width:100%;height:4px;border-radius:2px;background:rgba(0,0,0,.12);position:relative}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .15s linear;position:relative}
.progress-fill::after{content:'';position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.seek-input{position:absolute;inset:-10px 0;width:100%;opacity:0;cursor:pointer;-webkit-appearance:none;height:calc(100% + 20px)}
input[type=range].vol{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:rgba(0,0,0,.12);outline:none;cursor:pointer;border:none}
input[type=range].vol::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.2);cursor:pointer}
#np-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.np-bg-art{position:absolute;inset:-40px;background-size:cover;background-position:center;filter:blur(50px) saturate(1.6) brightness(1.2);transform:scale(1.1);opacity:.35}
.np-bg-white{position:absolute;inset:0;background:rgba(255,255,255,.72)}
.np-inner{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding-top:max(env(safe-area-inset-top),14px)}
.np-topbar{display:flex;align-items:center;justify-content:space-between;padding:0 8px 10px}
.np-label{font-size:13px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.08em}
.np-chevron-btn{display:flex;align-items:center;color:var(--accent);padding:8px;cursor:pointer;border:none;background:transparent}
.np-art-section{padding:0 28px;display:flex;justify-content:center}
.np-art-box{width:100%;max-width:290px;aspect-ratio:1/1;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-md),0 16px 48px rgba(0,0,0,.14);background:#0d2237}
.np-art-box img{width:100%;height:100%;object-fit:cover}
.np-art-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:700;color:var(--accent)}
.np-meta{padding:18px 28px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.np-meta-left{flex:1;min-width:0}
.np-song-title{font-size:22px;font-weight:700;color:var(--t1);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.np-artist{font-size:16px;color:var(--accent);font-weight:500;margin-top:3px}
.np-album-name{font-size:13px;color:var(--t3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.np-fav-btn{padding:6px;color:var(--t4);display:flex;cursor:pointer;flex-shrink:0;border:none;background:transparent}
.np-seek-section{padding:18px 28px 0}
.np-times{display:flex;justify-content:space-between;margin-top:6px}
.np-controls{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 4px}
.ctrl-play-btn{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 6px 20px rgba(255,111,0,.38);transition:transform .1s;flex-shrink:0;border:none;cursor:pointer}
.ctrl-play-btn:active{transform:scale(.92)}
.ctrl-skip{width:56px;height:56px;display:flex;align-items:center;justify-content:center;color:var(--t1);cursor:pointer;flex-shrink:0;border:none;background:transparent;transition:opacity .15s}
.ctrl-skip:active{opacity:.5}
.ctrl-side{width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;background:transparent;transition:opacity .15s}
.ctrl-side:active{opacity:.5}
.ctrl-active{color:var(--accent)!important}
.np-vol{display:flex;align-items:center;gap:12px;padding:6px 28px;padding-bottom:max(env(safe-area-inset-bottom),20px);color:var(--t4)}
#mini-player{flex-shrink:0}
.mini-wrap{background:rgba(255,255,255,.88);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.mini-progress{height:2px;background:var(--border)}
.mini-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .2s linear}
.mini-inner{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer}
.mini-art{width:48px;height:48px;border-radius:9px;overflow:hidden;flex-shrink:0;background:#0d2237;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.mini-art img{width:100%;height:100%;object-fit:cover}
.mini-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--accent)}
.mini-info{flex:1;min-width:0}
.mini-title{font-size:14px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mini-artist{font-size:12px;color:var(--t3);margin-top:2px}
.mini-ctrls{display:flex;gap:4px;align-items:center}
.mini-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;flex-shrink:0;border:none;background:transparent;color:var(--t2);transition:background .15s}
.mini-btn:active{background:rgba(0,0,0,.06)}
.mini-play-btn{background:var(--accent)!important;color:#fff;box-shadow:0 2px 8px rgba(255,111,0,.35)}
.mini-play-btn:active{background:var(--accent2)!important}
.back-btn{display:inline-flex;align-items:center;gap:2px;color:var(--accent);font-size:16px;font-weight:500;padding:10px 16px;cursor:pointer;border:none;background:transparent}
.sub-header{background:rgba(242,242,247,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding-top:max(env(safe-area-inset-top),14px)}
.album-hero{position:relative;overflow:hidden;background:var(--card)}
.hero-bg-blur{position:absolute;inset:-20px;background-size:cover;background-position:center;filter:blur(30px) saturate(1.3) brightness(1.1);opacity:.3}
.hero-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:16px 24px 24px;gap:14px}
.hero-art{width:168px;height:168px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-md);background:#0d2237;flex-shrink:0}
.hero-art img{width:100%;height:100%;object-fit:cover}
.hero-art-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;font-weight:700;color:var(--accent)}
.artist-hero-art{width:72px;height:72px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#0d2237;box-shadow:0 4px 14px rgba(0,0,0,.14)}
.artist-hero-art img{width:100%;height:100%;object-fit:cover}
.artist-hero-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}
.album-sub-row{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background .1s}
.album-sub-row:active{background:rgba(0,0,0,.04)}
.album-sub-thumb{width:52px;height:52px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#0d2237}
.album-sub-thumb img{width:100%;height:100%;object-fit:cover}
.album-sub-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--accent);background:linear-gradient(135deg,#f5e6d3,#ffe0b2)}
.settings-group{background:var(--card);border-radius:var(--radius);margin:0 16px;overflow:hidden;box-shadow:var(--shadow)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;gap:12px}
.settings-divider{height:1px;background:var(--border);margin-left:18px}
.toggle-track{width:50px;height:28px;border-radius:14px;position:relative;transition:background .25s;cursor:pointer;flex-shrink:0;border:none;background:rgba(120,120,128,.2)}
.toggle-track-on{background:var(--accent)!important}
.toggle-thumb-el{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.25);transition:left .25s}
.toggle-off{left:3px}
.toggle-on-pos{left:25px}
.scan-wrap{width:260px;height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin:0 auto}
.scan-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes eq{0%,100%{height:4px}50%{height:15px}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <div id="mini-player"></div>
</div>
<audio id="audio" playsinline preload="auto"></audio>
<input type="file" id="folder-picker" webkitdirectory multiple style="display:none">
<input type="file" id="file-picker" multiple accept="audio/*,.mp3,.m4a,.aac,.flac,.ogg,.opus,.wav,.mp4" style="display:none">

ata-action="clear-library" style="width:100%;color:var(--red);border-color:rgba(255,59,48,.25)">Clear Library</button></div><div class="section-title" style="margin-top:8px">About</div><div class="settings-group"><div class="settings-row"><span style="font-size:15px;color:var(--t2)">App</span><div style="display:flex;align-items:center;gap:8px"><img src="${ICON}" style="width:28px;height:28px;border-radius:7px"><span style="font-size:15px;font-weight:600;color:var(--accent)">Raaag</span></div></div><div class="settings-divider"></div><div class="settings-row"><span style="font-size:15px;color:var(--t2)">Version</span><span style="font-size:15px;color:var(--t3)">1.0.0</span></div><div class="settings-divider"></div><div class="settings-row"><span style="font-size:15px;color:var(--t2)">Storage</span><span style="font-size:15px;color:var(--t3)">Local only</span></div></div><div class="settings-group" style="margin:10px 16px 32px;padding:16px 18px"><div style="font-size:15px;font-weight:600;color:var(--accent);margin-bottom:6px">Install on iPhone</div><div style="font-size:14px;color:var(--t2);line-height:1.6">Safari &rarr; Share &rarr; "Add to Home Screen"</div></div></div></div>`;}
function miniHTML(){const song=S.currentSong;if(!song||S.screen==='now-playing'||S.screen==='queue')return'';const pct=S.duration>0?(S.currentTime/S.duration)*100:0;return`<div class="mini-wrap"><div class="mini-progress"><div class="mini-prog-fill" id="mini-fill" style="width:${pct}%"></div></div><div class="mini-inner" data-action="navigate" data-screen="now-playing"><div class="mini-art">${artEl(song.coverArt,song.album,'mini-initial')}</div><div class="mini-info"><div class="mini-title">${esc(song.title)}</div><div class="mini-artist">${esc(song.artist)}</div></div><div class="mini-ctrls"><button class="mini-btn mini-play-btn" data-action="toggle-play" id="mini-play">${S.isPlaying?I.pause:I.play}</button><button class="mini-btn" data-action="next" style="color:var(--t2)">${I.next}</button></div></div></div>`;}
function renderCurrent(){const el=document.getElementById('screen'),mp=document.getElementById('mini-player');let html='';switch(S.screen){case 'library':html=scrLibrary();break;case 'now-playing':html=scrNowPlaying();break;case 'artist':html=scrArtist();break;case 'album':html=scrAlbum();break;case 'queue':html=scrQueue();break;case 'favorites':html=scrFavorites();break;case 'settings':html=scrSettings();break;default:html=scrLibrary();}if(el)el.innerHTML=html;if(mp)mp.innerHTML=miniHTML();const sk=document.getElementById('np-seek');if(sk){sk.addEventListener('touchstart',()=>{},{passive:true});sk.addEventListener('input',e=>{const t=parseFloat(e.target.value);const f=document.getElementById('np-fill');if(f&&S.duration>0)f.style.width=`${(t/S.duration)*100}%`;const c=document.getElementById('np-cur');if(c)c.textContent=fmt(t);});sk.addEventListener('change',e=>{Player.seek(parseFloat(e.target.value));});}}

document.getElementById('app').addEventListener('click',async e=>{const t=e.target.closest('[data-action]');if(!t)return;switch(t.dataset.action){case 'navigate':if(e.target.closest('.mini-ctrls'))break;Nav.push(t.dataset.screen,t.dataset.id?{id:t.dataset.id}:{});break;case 'go-back':Nav.back();break;case 'play-song':{const song=S.library?.songs[t.dataset.songId];if(!song)break;let q=S.songs;if(t.dataset.qids){const ids=t.dataset.qids.split(',');const m=ids.map(id=>S.library?.songs[id]).filter(Boolean);if(m.length)q=m;}await Player.playSong(song,q);break;}case 'play-queue-idx':{const idx=parseInt(t.dataset.idx),song=S.queue[idx];if(!song)break;S.queueIndex=idx;await Player.playSong(song,S.queue);break;}case 'toggle-play':await Player.toggle();break;case 'next':await Player.next();break;case 'prev':await Player.prev();break;case 'cycle-repeat':Player.cycleRepeat();renderCurrent();break;case 'toggle-shuffle':Player.toggleShuffle();renderCurrent();break;case 'toggle-favorite':{const id=t.dataset.songId;S.favorites=S.favorites.includes(id)?S.favorites.filter(x=>x!==id):[id,...S.favorites];saveSt();renderCurrent();break;}case 'import-music':if('showDirectoryPicker' in window){try{const h=await window.showDirectoryPicker({mode:'read'});await importDir(h);}catch(e){if(e.name!=='AbortError')alert('Error: '+e.message);}}else document.getElementById('folder-picker').click();break;case 'clear-library':if(!confirm('Clear entire library?'))break;await DB.clearAll();LS.clearLib();S.library=null;S.currentSong=null;S.queue=[];Player.audio.pause();Player.audio.src='';S.isPlaying=false;renderCurrent();break;case 'search-clear':S.searchQuery='';renderCurrent();break;case 'play-album':{const alb=S.library?.albums[t.dataset.albumId];if(!alb)break;const songs=alb.songs.map(id=>S.library.songs[id]).filter(Boolean);if(songs.length)await Player.playSong(songs[0],songs);break;}
case 'shuffle-album':{const alb=S.library?.albums[t.dataset.albumId];if(!alb)break;const songs=alb.songs.map(id=>S.library.songs[id]).filter(Boolean);if(!songs.length)break;Player.toggleShuffle();if(!S.shuffle){Player.toggleShuffle();}await Player.playSong(songs[Math.floor(Math.random()*songs.length)],songs);break;}
case 'play-artist':{const art=S.library?.artists[t.dataset.artistId];if(!art)break;const songs=art.albums.flatMap(id=>(S.library?.albums[id]?.songs||[]).map(s=>S.library?.songs[s])).filter(Boolean);if(songs.length)await Player.playSong(songs[0],songs);break;}

document.getElementById('app').addEventListener('input',e=>{const t=e.target;if(t.dataset.action==='set-volume')Player.setVolume(t.value);if(t.id==='search-inp'){S.searchQuery=t.value;const c=document.getElementById('lib-content');if(c){const songs=S.songs,q=S.searchQuery;const f=q?songs.filter(s=>[s.title,s.artist,s.album].some(x=>x.toLowerCase().includes(q.toLowerCase()))):songs;c.innerHTML=q?scrSearch(f,songs):scrFolders();}}});
async function*walkDir(h,rel){const AUD=new Set(['.mp3','.m4a','.aac','.flac','.ogg','.opus','.wav','.mp4','.alac']);for await(const[name,entry]of h.entries()){if(name.startsWith('.'))continue;const ep=rel?`${rel}/${name}`:name;if(entry.kind==='directory'){yield*walkDir(entry,ep);}else if(entry.kind==='file'){const ext=name.slice(name.lastIndexOf('.')).toLowerCase();if(!AUD.has(ext))continue;try{const file=await entry.getFile();Object.defineProperty(file,'_relativePath',{value:ep});yield file;}catch{}}}}
async function importDir(dh){if(S.screen!=='library')S.history=[{screen:'library',params:{}}];S.scanning=true;S.scanProgress={total:0,done:0,current:'Scanning folders...'};renderCurrent();try{const files=[];for await(const f of walkDir(dh,''))files.push(f);if(!files.length){alert('No audio files found.');S.scanning=false;renderCurrent();return;}const lib=await Scanner.scan(files,p=>{S.scanProgress=p;const b=document.getElementById('scan-bar');if(b&&p.total>0)b.style.width=`${Math.round((p.done/p.total)*100)}%`;});if(S.library){Object.assign(S.library.songs,lib.songs);Object.assign(S.library.albums,lib.albums);Object.assign(S.library.artists,lib.artists);LS.saveLib(S.library);}else S.library=lib;}catch(e){alert('Import error: '+(e.message||e));}S.scanning=false;S.scanProgress=null;renderCurrent();}
async function importFiles(files){if(!files||!files.length)return;if(S.screen!=='library')S.history=[{screen:'library',params:{}}];S.scanning=true;S.scanProgress={total:files.length,done:0,current:'Reading files...'};renderCurrent();try{const lib=await Scanner.scan(files,p=>{S.scanProgress=p;const b=document.getElementById('scan-bar');if(b&&p.total>0)b.style.width=`${Math.round((p.done/p.total)*100)}%`;});if(S.library){Object.assign(S.library.songs,lib.songs);Object.assign(S.library.albums,lib.albums);Object.assign(S.library.artists,lib.artists);LS.saveLib(S.library);}else S.library=lib;}catch(e){alert('Import error: '+(e.message||e));}S.scanning=false;S.scanProgress=null;}
document.getElementById('folder-picker').addEventListener('change',async e=>{await importFiles(e.target.files);e.target.value='';renderCurrent();});

async function init(){const store=LS.loadStore();S.playlists=store.playlists||[];S.favorites=store.favorites||[];S.recentlyPlayed=store.recentlyPlayed||[];S.volume=store.settings?.volume??.8;S.repeatMode=store.settings?.repeatMode??'off';S.shuffle=store.settings?.shuffle??false;Player.audio.volume=S.volume;const lib=LS.loadLib();if(lib){S.library=lib;}else{try{const songs=await DB.getAllMetadata();if(songs.length>0){const r={songs:{},albums:{},artists:{},lastSync:Date.now()};songs.forEach(s=>{r.songs[s.id]=s;if(!r.albums[s.albumId])r.albums[s.albumId]={id:s.albumId,name:s.album,artist:s.artist,artistId:s.artistId,songs:[],coverArt:s.coverArt};if(!r.albums[s.albumId].songs.includes(s.id))r.albums[s.albumId].songs.push(s.id);if(!r.artists[s.artistId])r.artists[s.artistId]={id:s.artistId,name:s.artist,albums:[],coverArt:null};if(!r.artists[s.artistId].albums.includes(s.albumId))r.artists[s.artistId].albums.push(s.albumId);});LS.saveLib(r);S.library=r;}}catch(e){console.warn(e);}}renderCurrent();if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});}
init();
})();
</script>
