<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Raaag">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Raaag</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js" onerror="window.jsmediatags=null"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --bg:#000;--bg2:#111111;--bg3:#1c1c1e;
  --s1:rgba(255,255,255,0.06);--s2:rgba(255,255,255,0.10);--s3:rgba(255,255,255,0.16);
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.18);
  --accent:#FF6F00;--gold:#D4AF37;--accent2:#FF9500;
  --t1:#ffffff;--t2:rgba(255,255,255,0.60);--t3:rgba(255,255,255,0.35);
  --radius:14px;--radius-sm:10px;--radius-lg:20px;
}
html,body,#app{height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',system-ui,-apple-system,sans-serif;overflow:hidden;overscroll-behavior:none}
#app{display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}
button{font-family:inherit;border:none;cursor:pointer;background:transparent;color:inherit}
input{font-family:inherit}
img{display:block}
::-webkit-scrollbar{display:none}

/* ── Screen ── */
#screen{flex:1;display:flex;flex-direction:column;overflow:hidden;animation:fadeIn .2s ease}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:100px}
.center-fill{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;gap:20px}

/* ── Typography ── */
.t1{color:var(--t1)}.t2{color:var(--t2)}.t3{color:var(--t3)}
.fw6{font-weight:600}.fw7{font-weight:700}.fw5{font-weight:500}
.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}.f15{font-size:15px}.f17{font-size:17px}.f20{font-size:20px}.f24{font-size:24px}.f28{font-size:28px}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.accent{color:var(--accent)}.gold{color:var(--gold)}

/* ── Layout ── */
.row{display:flex;flex-direction:row;align-items:center}
.col{display:flex;flex-direction:column}
.gap4{gap:4px}.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
.flex1{flex:1;min-width:0}
.px16{padding-left:16px;padding-right:16px}
.px20{padding-left:20px;padding-right:20px}
.py12{padding-top:12px;padding-bottom:12px}
.jcb{justify-content:space-between}
.jcc{justify-content:center}

/* ── Safe areas ── */
.safe-top{padding-top:max(env(safe-area-inset-top),14px)}
.safe-bottom{padding-bottom:max(env(safe-area-inset-bottom),20px)}

/* ── Glass card ── */
.glass{background:var(--s1);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius)}
.glass2{background:var(--s2);border:1px solid var(--border2);border-radius:var(--radius)}

/* ── Icon button ── */
.icon-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s;color:var(--t2);flex-shrink:0}
.icon-btn:active{background:var(--s2)}
.icon-btn svg{pointer-events:none}

/* ── Header ── */
.header{display:flex;flex-direction:row;align-items:center;justify-content:space-between;padding:0 16px 8px;padding-top:max(env(safe-area-inset-top),14px)}
.logo{font-size:26px;font-weight:700;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── Search ── */
.search-bar{margin:0 16px 14px;position:relative;display:flex;align-items:center}
.search-icon-wrap{position:absolute;left:12px;color:var(--t3);pointer-events:none;display:flex}
.search-inp{width:100%;padding:10px 36px 10px 40px;border-radius:var(--radius-sm);background:var(--s2);border:1px solid var(--border);color:var(--t1);font-size:15px;outline:none;-webkit-appearance:none}
.search-inp::placeholder{color:var(--t3)}
.search-clear{position:absolute;right:10px;color:var(--t3);display:flex;padding:4px}

/* ── Folder list ── */
.folder-item{display:flex;flex-direction:row;align-items:center;gap:14px;padding:10px 16px;cursor:pointer;transition:background .12s;border-radius:var(--radius-sm);margin:0 8px 2px}
.folder-item:active{background:var(--s2)}
.folder-art{width:60px;height:60px;border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,#1a2a3a,#0a1520)}
.folder-art img{width:100%;height:100%;object-fit:cover}
.folder-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:var(--gold);background:linear-gradient(135deg,#1a2535,#0d1b28)}
.folder-chevron{color:var(--t3);flex-shrink:0;display:flex}

/* ── Song row ── */
.song-item{display:flex;flex-direction:row;align-items:center;gap:12px;padding:8px 16px;cursor:pointer;transition:background .12s;border-radius:var(--radius-sm);margin:0 8px 2px}
.song-item:active{background:var(--s2)}
.song-item.active{background:rgba(255,111,0,0.08)}
.song-art{width:48px;height:48px;border-radius:8px;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,#1a2535,#0d1b28);position:relative}
.song-art img{width:100%;height:100%;object-fit:cover}
.song-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--gold)}
.eq-anim{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);border-radius:8px}
.eq-bars{display:flex;gap:2px;align-items:flex-end;height:18px}
.eq-bars span{display:block;width:3px;background:var(--accent);border-radius:2px;animation:eq .7s ease-in-out infinite}
.eq-bars span:nth-child(2){animation-delay:.15s}
.eq-bars span:nth-child(3){animation-delay:.30s}

/* ── Section header ── */
.section-hdr{display:flex;flex-direction:row;align-items:center;justify-content:space-between;padding:20px 20px 8px}

/* ── Stats bar ── */
.stats-bar{display:flex;flex-direction:row;align-items:center;justify-content:space-between;padding:6px 20px 10px}

/* ── Empty state ── */
.empty-icon{width:72px;height:72px;border-radius:24px;background:var(--s2);display:flex;align-items:center;justify-content:center;color:var(--t3)}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border-radius:var(--radius);font-size:16px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;transition:opacity .15s}
.btn-primary:active{opacity:.85}
.btn-secondary{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--radius);font-size:14px;font-weight:500;background:var(--s2);color:var(--t2);cursor:pointer;border:1px solid var(--border)}
.btn-danger{color:#ff453a;font-size:13px;padding:4px;cursor:pointer}

/* ── Progress bar / seek ── */
.progress-wrap{position:relative;padding:4px 0}
.progress-track{width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);overflow:visible;position:relative}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .15s linear;position:relative}
.progress-fill::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.seek-input{position:absolute;inset:-8px 0;width:100%;opacity:0;cursor:pointer;-webkit-appearance:none;appearance:none;height:calc(100% + 16px)}

/* ── Range (volume) ── */
input[type=range].vol{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);outline:none;cursor:pointer;border:none}
input[type=range].vol::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer}

/* ── Now Playing ── */
#np-screen{position:relative;flex:1;display:flex;flex-direction:column;overflow:hidden}
.np-bg{position:absolute;inset:-30px;background-size:cover;background-position:center;filter:blur(40px) saturate(1.4);transform:scale(1.1);opacity:.55}
.np-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,.65) 100%)}
.np-content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding-top:max(env(safe-area-inset-top),14px)}
.np-topbar{display:flex;flex-direction:row;align-items:center;justify-content:space-between;padding:0 8px 12px}
.np-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.08em}
.np-art-wrap{padding:0 32px;display:flex;justify-content:center}
.np-art{width:100%;max-width:300px;aspect-ratio:1/1;border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.7);background:linear-gradient(135deg,#1a2535,#0d1b28)}
.np-art img{width:100%;height:100%;object-fit:cover}
.np-art-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:700;color:var(--gold)}
.np-info{padding:20px 28px 0}
.np-title{font-size:22px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:4px}
.np-artist{font-size:15px;color:rgba(255,255,255,.75)}
.np-album{font-size:13px;color:rgba(255,255,255,.45);margin-top:2px}
.np-fav{display:flex;align-items:center;padding:4px;flex-shrink:0}
.np-seek-wrap{padding:20px 28px 0}
.np-seek-times{display:flex;flex-direction:row;justify-content:space-between;margin-top:8px}
.np-controls{display:flex;flex-direction:row;align-items:center;justify-content:space-between;padding:20px 28px 8px}
.ctrl-play{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(255,111,0,.4);transition:transform .1s,opacity .15s;flex-shrink:0}
.ctrl-play:active{transform:scale(.94)}
.ctrl-play svg{pointer-events:none}
.ctrl-sm{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);transition:opacity .15s;flex-shrink:0}
.ctrl-sm:active{opacity:.6}
.ctrl-sm svg{pointer-events:none}
.ctrl-md{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;transition:opacity .15s;flex-shrink:0}
.ctrl-md:active{opacity:.6}
.ctrl-md svg{pointer-events:none}
.ctrl-active{color:var(--accent) !important}
.np-vol{display:flex;flex-direction:row;align-items:center;gap:12px;padding:4px 28px;padding-bottom:max(env(safe-area-inset-bottom),20px);color:rgba(255,255,255,.5)}

/* ── Mini Player ── */
#mini-player{flex-shrink:0}
.mini-wrap{display:flex;flex-direction:column;background:rgba(20,20,20,0.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.mini-bar{height:2px;background:rgba(255,255,255,.08)}
.mini-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .2s linear}
.mini-content{display:flex;flex-direction:row;align-items:center;gap:12px;padding:10px 14px;cursor:pointer}
.mini-art{width:46px;height:46px;border-radius:8px;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,#1a2535,#0d1b28)}
.mini-art img{width:100%;height:100%;object-fit:cover}
.mini-art-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--gold)}
.mini-ctrls{display:flex;flex-direction:row;align-items:center;gap:4px}
.mini-btn{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.mini-btn:active{opacity:.6}
.mini-btn svg{pointer-events:none}
.mini-play{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}

/* ── Sub-screens ── */
.sub-header{display:flex;flex-direction:column;padding-top:max(env(safe-area-inset-top),14px);padding-bottom:16px}
.back-btn{display:flex;flex-direction:row;align-items:center;gap:2px;color:var(--accent);font-size:16px;font-weight:500;padding:8px 16px;cursor:pointer;width:fit-content}
.back-btn svg{pointer-events:none}
.album-hero{display:flex;flex-direction:column;align-items:center;padding:0 24px 20px;position:relative;overflow:hidden}
.album-hero-blur{position:absolute;inset:-20px;background-size:cover;background-position:center;filter:blur(30px) saturate(1.2);opacity:.25}
.album-hero-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px;width:100%}
.album-hero-art{width:160px;height:160px;border-radius:var(--radius);overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.6);background:linear-gradient(135deg,#1a2535,#0d1b28)}
.album-hero-art img{width:100%;height:100%;object-fit:cover}

/* ── Settings ── */
.settings-row{display:flex;flex-direction:row;align-items:center;justify-content:space-between;padding:14px 20px}
.settings-divider{height:1px;background:var(--border);margin:0 20px}
.toggle{width:50px;height:28px;border-radius:14px;position:relative;transition:background .25s;flex-shrink:0;cursor:pointer}
.toggle-track-off{background:rgba(255,255,255,.2)}
.toggle-track-on{background:var(--accent)}
.toggle-thumb{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.3);transition:left .25s}
.toggle-off{left:3px}
.toggle-on-pos{left:25px}
.pill-btn{padding:6px 16px;border-radius:999px;font-size:13px;font-weight:600;border:none;cursor:pointer}
.pill-off{background:var(--s2);color:var(--t2);border:1px solid var(--border)}
.pill-on{background:var(--accent);color:#fff}
.info-row{display:flex;flex-direction:row;justify-content:space-between;align-items:center;padding:10px 20px}

/* ── Scan progress ── */
.scan-progress{width:260px;height:4px;border-radius:2px;background:var(--s2);overflow:hidden;margin:0 auto}
.scan-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .3s}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes eq{0%,100%{height:4px}50%{height:15px}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 2s ease-in-out infinite}
</style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
  <div id="mini-player"></div>
</div>
<audio id="audio" playsinline preload="auto"></audio>
<input type="file" id="folder-picker" webkitdirectory multiple style="display:none">
<input type="file" id="file-picker" multiple accept="audio/*,.mp3,.m4a,.aac,.flac,.ogg,.opus,.wav,.mp4" style="display:none">

// ── DB ─────────────────────────────────────────────────────────────────────
const DB = (() => {
  let _db = null;
  function open() {
    if (_db) return Promise.resolve(_db);
    return new Promise((res, rej) => {
      const req = indexedDB.open('raaag-db', 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('songs')) db.createObjectStore('songs', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('metadata')) db.createObjectStore('metadata', { keyPath: 'id' });
      };
      req.onsuccess = e => { _db = e.target.result; res(_db); };
      req.onerror = e => rej(e.target.error);
    });
  }
  function rq(r) { return new Promise((res, rej) => { r.onsuccess = e => res(e.target.result); r.onerror = e => rej(e.target.error); }); }
  return {
    async saveSong(id, blob, meta) {
      const db = await open();
      const buffer = await blob.arrayBuffer();
      const type = blob.type || guessMime(blob.name || id);
      await rq(db.transaction('songs','readwrite').objectStore('songs').put({ id, buffer, type }));
      await rq(db.transaction('metadata','readwrite').objectStore('metadata').put({ id, data: meta }));
    },
    async getSongBlob(id) {
      const db = await open();
      const r = await rq(db.transaction('songs','readonly').objectStore('songs').get(id));
      if (!r) return null;
      const blob = r.blob ? r.blob : new Blob([r.buffer], { type: r.type || 'audio/mpeg' });
      return URL.createObjectURL(blob);
    },
    async getAllMetadata() {
      const db = await open();
      const all = await rq(db.transaction('metadata','readonly').objectStore('metadata').getAll());
      return all.map(r => r.data);
    },
    async clearAll() {
      const db = await open();
      await rq(db.transaction('songs','readwrite').objectStore('songs').clear());
      await rq(db.transaction('metadata','readwrite').objectStore('metadata').clear());
    }
  };
})();

// ── Local Storage ──────────────────────────────────────────────────────────
const LS = {
  LIB:'raaag-library', STORE:'raaag-store',
  defStore:() => ({ playlists:[], favorites:[], recentlyPlayed:[], settings:{ volume:.8, repeatMode:'off', shuffle:false } }),
  loadLib() { try { return JSON.parse(localStorage.getItem(this.LIB)); } catch { return null; } },
  saveLib(l) { localStorage.setItem(this.LIB, JSON.stringify(l)); },
  clearLib() { localStorage.removeItem(this.LIB); },
  loadStore() { try { const r = localStorage.getItem(this.STORE); return r ? {...this.defStore(),...JSON.parse(r)} : this.defStore(); } catch { return this.defStore(); } },
  saveStore(s) { localStorage.setItem(this.STORE, JSON.stringify(s)); }
};

// ── Utils ──────────────────────────────────────────────────────────────────
function fmt(s) { if (!isFinite(s)||s<=0) return '0:00'; return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`; }
function slug(s) { return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'x'; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function parseFilename(name) { const b=name.replace(/\.[^.]+$/,''); const m=b.match(/^(\d+)[.\s\-]+(.+)$/); return m?{track:parseInt(m[1]),title:m[2].trim()}:{track:0,title:b.trim()}; }
function guessMime(n) { return ({'.mp3':'audio/mpeg','.m4a':'audio/mp4','.aac':'audio/aac','.flac':'audio/flac','.ogg':'audio/ogg','.opus':'audio/ogg','.wav':'audio/wav','.mp4':'audio/mp4'})[String(n).slice(String(n).lastIndexOf('.')).toLowerCase()]||'audio/mpeg'; }
function shuffled(len) { const a=Array.from({length:len},(_,i)=>i); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function saveStore() { LS.saveStore({ playlists:S.playlists, favorites:S.favorites, recentlyPlayed:S.recentlyPlayed, settings:{ volume:S.volume, repeatMode:S.repeatMode, shuffle:S.shuffle } }); }

// ── Art HTML helper ────────────────────────────────────────────────────────
function artImg(src, title, cls='song-art') {

    `</div>`;
}

// ── Player ─────────────────────────────────────────────────────────────────
const Player = (() => {
  const audio = document.getElementById('audio');
  let blobUrl = null;
  function effIdx() { return (S.shuffle&&S.shuffleOrder.length)?(S.shuffleOrder[S.queueIndex]??S.queueIndex):S.queueIndex; }
  audio.addEventListener('timeupdate',()=>{ S.currentTime=audio.currentTime; S.duration=isFinite(audio.duration)?audio.duration:0; updateLiveUI(); });
  audio.addEventListener('loadedmetadata',()=>{ S.duration=isFinite(audio.duration)?audio.duration:0; });
  audio.addEventListener('ended',async()=>{ await next(); });
  audio.addEventListener('play',()=>{ S.isPlaying=true; updateLiveUI(); });
  audio.addEventListener('pause',()=>{ S.isPlaying=false; updateLiveUI(); });
  async function loadSong(song) {
    if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl=null; }
    S.currentSong = song;
    const url = await DB.getSongBlob(song.id);
    if (!url) return false;
    blobUrl = url; audio.src = url; audio.load(); return true;
  }
  async function doPlay() {
    try { const p = audio.play(); if (p) await p; } catch(e) { console.warn('play:',e); }
    S.isPlaying = !audio.paused; updateLiveUI();
  }
  async function next() {
    if (S.repeatMode==='one') { audio.currentTime=0; await doPlay(); return; }
    const max=S.queue.length-1;
    if (S.queueIndex<max) S.queueIndex++;
    else if (S.repeatMode==='all') S.queueIndex=0;
    else { S.isPlaying=false; updateLiveUI(); return; }
    const song=S.queue[effIdx()]; if (!song) return;
    if (await loadSong(song)) { await doPlay(); renderCurrentScreen(); }
  }
  async function prev() {
    if (audio.currentTime>3) { audio.currentTime=0; return; }
    if (S.queueIndex>0) S.queueIndex--;
    else S.queueIndex=S.repeatMode==='all'?S.queue.length-1:0;
    const song=S.queue[effIdx()]; if (!song) return;
    if (await loadSong(song)) { await doPlay(); renderCurrentScreen(); }
  }
  return {
    get audio() { return audio; },
    async playSong(song, queue) {
      S.queue=queue||[song]; S.queueIndex=Math.max(0,S.queue.findIndex(s=>s.id===song.id));
      if (S.shuffle) S.shuffleOrder=shuffled(S.queue.length);
      if (await loadSong(song)) await doPlay();
      S.recentlyPlayed=[song.id,...S.recentlyPlayed.filter(id=>id!==song.id)].slice(0,50);
      saveStore(); renderCurrentScreen();
    },
    async toggle() { audio.paused ? await doPlay() : audio.pause(); },
    next, prev,
    seek(t) { if (isFinite(t)) audio.currentTime=t; },
    setVolume(v) { S.volume=Math.max(0,Math.min(1,parseFloat(v))); audio.volume=S.volume; saveStore(); },
    cycleRepeat() { const m=['off','all','one']; S.repeatMode=m[(m.indexOf(S.repeatMode)+1)%3]; saveStore(); updateLiveUI(); },
    toggleShuffle() { S.shuffle=!S.shuffle; if(S.shuffle)S.shuffleOrder=shuffled(S.queue.length); saveStore(); updateLiveUI(); }
  };
})();

// ── Scanner ────────────────────────────────────────────────────────────────
const Scanner = {
  readTags(file) {
    return new Promise(resolve => {
      const fb=()=>{ const r=parseFilename(file.name); resolve({...r,artist:null,album:null,year:null,genre:null,coverArt:null}); };
      if (!window.jsmediatags) { fb(); return; }
      try {
        window.jsmediatags.read(file, {
          onSuccess(tag) {
            const t=tag.tags; let coverArt=null;
            if (t.picture) { try { coverArt=URL.createObjectURL(new Blob([new Uint8Array(t.picture.data)],{type:t.picture.format})); } catch {} }
            const {track:fbTrack,title:fbTitle}=parseFilename(file.name);
            resolve({ title:t.title?.trim()||fbTitle, artist:t.artist?.trim()||null, album:t.album?.trim()||null, track:t.track?parseInt(t.track):fbTrack, year:t.year?parseInt(t.year):null, genre:t.genre||null, coverArt });
          },
          onError(){fb();}
        });
      } catch{fb();}
    });
  },
  async scan(files, onProgress) {
    const AUDIO=new Set(['.mp3','.m4a','.aac','.flac','.ogg','.opus','.wav','.mp4','.alac']);
    const audioFiles=Array.from(files).filter(f=>{ const e=f.name.slice(f.name.lastIndexOf('.')).toLowerCase(); return AUDIO.has(e); });
    if (!audioFiles.length) throw new Error('No audio files found');
    const lib={songs:{},albums:{},artists:{},lastSync:Date.now()};
    for (let i=0;i<audioFiles.length;i++) {
      const file=audioFiles[i];
      onProgress?.({total:audioFiles.length,done:i,current:file.name});
      const pathStr=file._relativePath||file.webkitRelativePath||'';
      const parts=pathStr.split('/').filter(Boolean);
      let pathArtist=null,pathAlbum=null;
      if (file._relativePath){if(parts.length>=3){pathArtist=parts[0];pathAlbum=parts[1];}else if(parts.length===2)pathArtist=parts[0];}
      else {if(parts.length>=4){pathArtist=parts[1];pathAlbum=parts[2];}else if(parts.length===3)pathArtist=parts[1];}
      const tags=await this.readTags(file);
      const artistName=tags.artist||pathArtist||'Unknown Artist';
      const albumName=tags.album||pathAlbum||'Unknown Album';
      const artistId=slug(artistName), albumId=artistId+'-'+slug(albumName);
      const songId=albumId+'-'+slug(file.name)+'-'+i;
      const song={id:songId,title:tags.title,artist:artistName,album:albumName,albumId,artistId,duration:0,track:tags.track,year:tags.year,genre:tags.genre,coverArt:tags.coverArt||null,filePath:file.webkitRelativePath||file.name};
      await DB.saveSong(songId,file,song);
      lib.songs[songId]=song;
      if (!lib.albums[albumId]) lib.albums[albumId]={id:albumId,name:albumName,artist:artistName,artistId,songs:[],coverArt:song.coverArt||null,year:song.year||null};
      const alb=lib.albums[albumId];
      if (!alb.songs.includes(songId)) alb.songs.push(songId);
      if (!alb.coverArt&&song.coverArt) alb.coverArt=song.coverArt;
      if (!alb.year&&song.year) alb.year=song.year;
      if (!lib.artists[artistId]) lib.artists[artistId]={id:artistId,name:artistName,albums:[],coverArt:null};
      const art=lib.artists[artistId];
      if (!art.albums.includes(albumId)) art.albums.push(albumId);
      if (!art.coverArt&&alb.coverArt) art.coverArt=alb.coverArt;
      onProgress?.({total:audioFiles.length,done:i+1,current:song.title});
    }
    for (const alb of Object.values(lib.albums)) {
      alb.songs.sort((a,b)=>(lib.songs[a]?.track||0)-(lib.songs[b]?.track||0));
      if (!alb.coverArt){const f=alb.songs.find(id=>lib.songs[id]?.coverArt);if(f)alb.coverArt=lib.songs[f].coverArt;}
      const art=lib.artists[alb.artistId];
      if (art&&!art.coverArt&&alb.coverArt) art.coverArt=alb.coverArt;
    }
    LS.saveLib(lib); return lib;
  }
};

// ── Mini Player ────────────────────────────────────────────────────────────
function miniPlayerHTML() {
  const song=S.currentSong;

  const pct=S.duration>0?(S.currentTime/S.duration)*100:0;
  return `<div class="mini-wrap">
    <div class="mini-bar"><div class="mini-fill" id="mini-fill" style="width:${pct}%"></div></div>
    <div class="mini-content" data-action="navigate" data-screen="now-playing">
      <div class="mini-art">
        ${song.coverArt?`<img src="${esc(song.coverArt)}">`:
          `<div class="mini-art-initial">${esc((song.title||'?').charAt(0))}</div>`}
      </div>
      <div class="flex1 col" style="gap:3px;min-width:0">
        <div class="f14 fw5 t1 truncate">${esc(song.title)}</div>
        <div class="f12 t3 truncate">${esc(song.artist)}</div>
      </div>
      <div class="mini-ctrls" onclick="event.stopPropagation()">
        <button class="mini-btn mini-play" data-action="toggle-play" id="mini-play">${S.isPlaying?I.pause:I.play}</button>
        <button class="mini-btn" data-action="next" style="color:rgba(255,255,255,.7)">${I.next}</button>
      </div>
    </div>
  </div>`;
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderCurrentScreen() {
  const el=document.getElementById('screen'), mp=document.getElementById('mini-player');
  let html='';
  switch(S.screen) {
    case 'library':     html=screenLibrary(); break;
    case 'now-playing': html=screenNowPlaying(); break;
    case 'artist':      html=screenArtist(); break;
    case 'album':       html=screenAlbum(); break;
    case 'queue':       html=screenQueue(); break;
    case 'favorites':   html=screenFavorites(); break;
    case 'settings':    html=screenSettings(); break;
    default:            html=screenLibrary();
  }
  if (el) el.innerHTML=html;
  if (mp) mp.innerHTML=miniPlayerHTML();

  // Wire seek slider
  const seekEl=document.getElementById('np-seek');
  if (seekEl) {
    seekEl.addEventListener('touchstart',()=>{},{passive:true});
    seekEl.addEventListener('input',e=>{
      const t=parseFloat(e.target.value);
      const fill=document.getElementById('np-fill');
      if (fill&&S.duration>0) fill.style.width=`${(t/S.duration)*100}%`;
      const cur=document.getElementById('np-cur');
      if (cur) cur.textContent=fmt(t);
    });
    seekEl.addEventListener('change',e=>{ Player.seek(parseFloat(e.target.value)); });
  }
}

function updateLiveUI() {
  const fill=document.getElementById('np-fill'), cur=document.getElementById('np-cur'),
        dur=document.getElementById('np-dur'), seek=document.getElementById('np-seek'),
        play=document.getElementById('np-play'),
        mFill=document.getElementById('mini-fill'), mPlay=document.getElementById('mini-play');
  const pct=S.duration>0?(S.currentTime/S.duration)*100:0;
  if (fill&&seek!==document.activeElement) fill.style.width=`${pct}%`;
  if (cur &&seek!==document.activeElement) cur.textContent=fmt(S.currentTime);
  if (dur) dur.textContent=fmt(S.duration);
  if (seek&&seek!==document.activeElement) seek.value=S.currentTime;
  if (play) play.innerHTML=S.isPlaying?I.pause:I.play;
  if (mFill) mFill.style.width=`${pct}%`;
  if (mPlay) mPlay.innerHTML=S.isPlaying?I.pause:I.play;
}

// ── Events ─────────────────────────────────────────────────────────────────
document.getElementById('app').addEventListener('click', async e => {
  const t=e.target.closest('[data-action]'); if (!t) return;
  switch(t.dataset.action) {
    case 'navigate': Nav.push(t.dataset.screen, t.dataset.id?{id:t.dataset.id}:{}); break;
    case 'go-back': Nav.back(); break;
    case 'play-song': {
      const song=S.library?.songs[t.dataset.songId]; if (!song) break;
      let queue=S.songs;
      if (t.dataset.qids) { const ids=t.dataset.qids.split(','); const m=ids.map(id=>S.library?.songs[id]).filter(Boolean); if(m.length)queue=m; }
      await Player.playSong(song,queue); break;
    }
    case 'play-queue-idx': {
      const idx=parseInt(t.dataset.idx), song=S.queue[idx]; if(!song)break;
      S.queueIndex=idx; await Player.playSong(song,S.queue); break;
    }
    case 'toggle-play': await Player.toggle(); break;
    case 'next': await Player.next(); break;
    case 'prev': await Player.prev(); break;
    case 'cycle-repeat': Player.cycleRepeat(); renderCurrentScreen(); break;
    case 'toggle-shuffle': Player.toggleShuffle(); renderCurrentScreen(); break;
    case 'toggle-favorite': {
      const id=t.dataset.songId;
      S.favorites=S.favorites.includes(id)?S.favorites.filter(x=>x!==id):[id,...S.favorites];
      saveStore(); renderCurrentScreen(); break;
    }
    case 'import-music':
      if ('showDirectoryPicker' in window) {
        try { const h=await window.showDirectoryPicker({mode:'read'}); await importFromDir(h); }
        catch(e){ if(e.name!=='AbortError')alert('Error: '+e.message); }
      } else { document.getElementById('folder-picker').click(); }
      break;
    case 'clear-library':
      if (!confirm('Clear entire library? Cannot be undone.')) break;
      await DB.clearAll(); LS.clearLib();
      S.library=null; S.currentSong=null; S.queue=[];
      Player.audio.pause(); Player.audio.src=''; S.isPlaying=false;
      renderCurrentScreen(); break;
    case 'search-clear': S.searchQuery=''; renderCurrentScreen(); break;
    case 'play-album': {
      const alb=S.library?.albums[t.dataset.albumId]; if(!alb)break;
      const songs=alb.songs.map(id=>S.library.songs[id]).filter(Boolean);
      if (songs.length) await Player.playSong(songs[0],songs); break;
    }
  }
});

document.getElementById('app').addEventListener('input', e => {
  const t=e.target;
  if (t.dataset.action==='set-volume') Player.setVolume(t.value);
  if (t.id==='search-inp') {
    S.searchQuery=t.value;
    const content=document.getElementById('lib-content');
    if (content) {
      const songs=S.songs, q=S.searchQuery;
      const filtered=q?songs.filter(s=>[s.title,s.artist,s.album].some(x=>x.toLowerCase().includes(q.toLowerCase()))):songs;
      content.innerHTML=q?searchResults(filtered,songs):folderList();
    }
  }
});

// ── Directory walker (desktop) ─────────────────────────────────────────────
async function* walkDir(handle, relPath) {
  const AUDIO=new Set(['.mp3','.m4a','.aac','.flac','.ogg','.opus','.wav','.mp4','.alac']);
  for await (const [name,entry] of handle.entries()) {
    if (name.startsWith('.')) continue;
    const entryPath=relPath?`${relPath}/${name}`:name;
    if (entry.kind==='directory') { yield* walkDir(entry,entryPath); }
    else if (entry.kind==='file') {
      const ext=name.slice(name.lastIndexOf('.')).toLowerCase();
      if (!AUDIO.has(ext)) continue;
      try { const file=await entry.getFile(); Object.defineProperty(file,'_relativePath',{value:entryPath}); yield file; } catch {}
    }
  }
}

async function importFromDir(dirHandle) {
  if (S.screen!=='library') S.history=[{screen:'library',params:{}}];
  S.scanning=true; S.scanProgress={total:0,done:0,current:'Walking folder tree…'}; renderCurrentScreen();
  try {
    const files=[]; for await (const f of walkDir(dirHandle,'')) files.push(f);
    if (!files.length){alert('No audio files found.');S.scanning=false;renderCurrentScreen();return;}
    const lib=await Scanner.scan(files,p=>{S.scanProgress=p;const b=document.getElementById('scan-bar');if(b&&p.total>0)b.style.width=`${Math.round((p.done/p.total)*100)}%`;});
    if(S.library){Object.assign(S.library.songs,lib.songs);Object.assign(S.library.albums,lib.albums);Object.assign(S.library.artists,lib.artists);LS.saveLib(S.library);}else S.library=lib;
  } catch(e){alert('Import error: '+(e.message||e));}
  S.scanning=false;S.scanProgress=null;renderCurrentScreen();
}

// ── File inputs ────────────────────────────────────────────────────────────
async function importFiles(files) {
  if (!files||!files.length) return;
  if (S.screen!=='library') S.history=[{screen:'library',params:{}}];
  S.scanning=true;S.scanProgress={total:files.length,done:0,current:'Reading files…'};renderCurrentScreen();
  try {
    const lib=await Scanner.scan(files,p=>{S.scanProgress=p;const b=document.getElementById('scan-bar');if(b&&p.total>0)b.style.width=`${Math.round((p.done/p.total)*100)}%`;});
    if(S.library){Object.assign(S.library.songs,lib.songs);Object.assign(S.library.albums,lib.albums);Object.assign(S.library.artists,lib.artists);LS.saveLib(S.library);}else S.library=lib;
  } catch(e){alert('Import error: '+(e.message||e));}
  S.scanning=false;S.scanProgress=null;
}

document.getElementById('folder-picker').addEventListener('change',async e=>{await importFiles(e.target.files);e.target.value='';renderCurrentScreen();});
document.getElementById('file-picker').addEventListener('change',async e=>{await importFiles(e.target.files);e.target.value='';renderCurrentScreen();});

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  const store=LS.loadStore();
  S.playlists=store.playlists||[];S.favorites=store.favorites||[];S.recentlyPlayed=store.recentlyPlayed||[];
  S.volume=store.settings?.volume??.8;S.repeatMode=store.settings?.repeatMode??'off';S.shuffle=store.settings?.shuffle??false;
  Player.audio.volume=S.volume;
  const lib=LS.loadLib();
  if (lib) { S.library=lib; }
  else {
    try {
      const songs=await DB.getAllMetadata();
      if (songs.length>0) {
        const r={songs:{},albums:{},artists:{},lastSync:Date.now()};
        songs.forEach(s=>{
          r.songs[s.id]=s;
          if(!r.albums[s.albumId])r.albums[s.albumId]={id:s.albumId,name:s.album,artist:s.artist,artistId:s.artistId,songs:[],coverArt:s.coverArt};
          if(!r.albums[s.albumId].songs.includes(s.id))r.albums[s.albumId].songs.push(s.id);
          if(!r.artists[s.artistId])r.artists[s.artistId]={id:s.artistId,name:s.artist,albums:[],coverArt:null};
          if(!r.artists[s.artistId].albums.includes(s.albumId))r.artists[s.artistId].albums.push(s.albumId);
        });
        LS.saveLib(r);S.library=r;
      }
    } catch(e){console.warn(e);}
  }
  S.isLoading=false;renderCurrentScreen();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
}

init();
})();
